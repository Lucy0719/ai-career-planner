<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>职业规划与人生道路建议</title>
  <style>
    :root{
      --bg:#f5f7fb;
      --panel:#ffffff;
      --panel2:#f2f5fa;
      --line:#d7deea;
      --text:#18202d;
      --muted:#5f6b7b;
      --accent:#5d84c8;
      --accent2:#7ea8d9;
      --shadow:0 12px 32px rgba(23, 38, 67, .08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden}
    body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
    button,input{font:inherit}
    .wrap,
    .wrap *{
      caret-color:transparent;
      user-select:none;
      -webkit-user-select:none;
    }
    button,
    .choice,
    .card,
    .pill,
    [role="button"]{
      caret-color:transparent;
      user-select:none;
      -webkit-user-select:none;
      cursor:default;
    }
    #mbtiSelectTitle,
    #mbtiSelectDesc,
    #mbtiShell .section-title,
    #mbtiShell .section-title *{
      caret-color:transparent;
      user-select:none;
      -webkit-user-select:none;
      cursor:default;
    }
    button:focus,
    .choice:focus,
    .card:focus,
    [role="button"]:focus{
      outline:none;
    }
    img,canvas,svg{max-width:100%}
    .wrap{max-width:1240px;margin:0 auto;padding:16px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .pad{padding:24px}
    h1{margin:0;font-size:clamp(28px,4vw,40px);line-height:1.15}
    h2{margin:0 0 12px;font-size:clamp(18px,2.5vw,22px)}
    p{margin:0;color:var(--muted);line-height:1.7}
    .topbar{display:flex;justify-content:flex-end;margin-bottom:10px;position:sticky;top:0;z-index:20;padding-top:8px;pointer-events:none}
    .topbar .lang-btn{pointer-events:auto}
    .lang-btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;color:var(--text);cursor:pointer;font-weight:700;white-space:nowrap}
    .wide-title{width:100%;padding:22px;background:linear-gradient(180deg,#fff 0%,#f8fafc 100%)}
    .title-row{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
    .title-copy{max-width:920px}
    .btn{min-height:44px;border:1px solid transparent;border-radius:12px;padding:12px 16px;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:8px}
    .btn.primary{background:linear-gradient(180deg,var(--accent) 0%, #4f75b3 100%);color:#fff}
    .btn.secondary{background:#fff;color:var(--muted);border-color:var(--line)}
    .btn.secondary.ghost{background:#f8fafc}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .card{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:16px;min-width:0}
    .card.soft{background:#f7f9fd}
    .pill{display:inline-flex;align-items:center;padding:7px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:12px;max-width:100%;overflow-wrap:anywhere}
    .hidden{display:none !important}
    .section{margin-top:18px}
    .section-title{margin-bottom:14px}
    .section-title h2{margin-bottom:6px}
    .choice{width:100%;min-height:44px;text-align:left;margin-top:8px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);padding:12px 14px;cursor:pointer;overflow-wrap:anywhere}
    .choice.active{border-color:var(--accent);background:#edf3ff}
    .choice:hover{background:#f8fbff}
    .bar{height:10px;background:#e9eef6;border-radius:999px;overflow:hidden}
    .bar>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px;min-width:0}
    .muted{color:var(--muted)}
    .qtext{font-size:clamp(18px,2.5vw,20px);line-height:1.6;min-height:88px;color:var(--text);overflow-wrap:anywhere}
    .option-list{display:grid;gap:10px}
    .report-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;min-width:0}
    .metric{margin:10px 0}
    .metric .row{font-size:13px;margin-bottom:6px}
    canvas{max-width:100%;display:block}
    .button-row{display:flex;gap:12px;align-items:center;justify-content:flex-start;flex-wrap:wrap}
    .lead{font-size:16px}
    .section-soft{background:linear-gradient(180deg,#fff 0%, #fbfcfe 100%)}
    .question-shell{max-width:920px;margin:0 auto}
    .stage{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
    .report-card-list{display:grid;gap:10px}
    .report-card-list .card{width:100%}
    .subtle{font-size:13px;color:var(--muted)}
    .mbti-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}

    @media (max-width:1020px){
      .grid4,.grid3,.grid2,.report-grid,.mbti-grid{grid-template-columns:1fr}
      .title-row{flex-direction:column}
    }
    @media (max-width:768px){
      .wrap{padding:12px}
      .pad{padding:16px}
      .title-row{gap:10px}
      .topbar{margin-bottom:8px}
      .lang-btn{padding:9px 12px;font-size:14px}
      .wide-title{padding:18px}
      h1{font-size:28px}
      .lead{font-size:14px}
      .grid4,.grid3,.grid2,.report-grid,.mbti-grid{grid-template-columns:1fr}
      .grid4 .card,.grid3 .card,.grid2 .card{padding:14px}
      .button-row{gap:10px}
      .btn{min-height:44px;padding:11px 14px;font-size:14px}
      .choice{min-height:44px;padding:11px 12px;font-size:14px}
      .qtext{font-size:18px}
      .section{margin-top:14px}
      .report-grid{gap:12px}
      .report-card-list .card{padding:14px}
    }
    @media (max-width:430px){
      .wrap{padding:10px}
      .pad{padding:14px}
      h1{font-size:26px}
      h2{font-size:18px}
      .wide-title{padding:16px}
      .btn,.choice{width:100%}
      .button-row{flex-direction:column;align-items:stretch}
      .button-row .btn{width:100%}
      .row{flex-direction:column;align-items:flex-start}
      .topbar{justify-content:flex-end}
      .pill{max-width:100%}
      canvas{height:auto}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><button class="lang-btn" id="langBtn" type="button" onclick="toggleLang()">中文 / English</button></div>

  <section class="panel wide-title">
    <div class="title-row">
      <div class="title-copy">
        <h1 id="mainTitle"></h1>
        <p class="lead" id="heroCopy"></p>
      </div>
    </div>
  </section>

  <section class="panel pad section section-soft">
    <div class="section-title">
      <h2 id="assessmentTitle"></h2>
      <p id="assessmentDesc"></p>
    </div>
    <div class="grid4">
      <div class="card soft"><strong id="card1Title"></strong><p id="card1Desc"></p></div>
      <div class="card soft"><strong id="card2Title"></strong><p id="card2Desc"></p></div>
      <div class="card soft"><strong id="card3Title"></strong><p id="card3Desc"></p></div>
      <div class="card soft"><strong id="card4Title"></strong><p id="card4Desc"></p></div>
    </div>
  </section>

  <section class="section">
    <div class="button-row" style="justify-content:flex-start">
      <button class="btn primary" id="startBtn" type="button" onclick="startSurvey()"></button>
      <button class="btn secondary ghost" id="resetBtn" type="button" onclick="resetAll()"></button>
    </div>
  </section>

  <section id="mbtiShell" class="panel pad section hidden">
    <div class="section-title">
      <h2 id="mbtiSelectTitle"></h2>
      <p id="mbtiSelectDesc"></p>
    </div>
    <div id="mbtiGrid" class="mbti-grid"></div>
    <div class="button-row" style="margin-top:16px;justify-content:flex-start">
      <button class="btn primary" id="mbtiContinueBtn" type="button" onclick="confirmMBTI()"></button>
      <button class="btn secondary ghost" id="mbtiSkipBtn" type="button" onclick="skipMBTI()"></button>
    </div>
  </section>

  <section id="surveyShell" class="panel pad section hidden">
    <div class="question-shell">
      <div class="row">
        <div>
          <div class="stage" id="stageName"></div>
          <h2 id="surveyTitle"></h2>
        </div>
        <div class="muted" id="progressText"></div>
      </div>
      <div class="bar" style="margin:10px 0 18px"><div id="progressBar" style="width:0%"></div></div>
      <div class="qtext" id="questionText"></div>
      <div id="options" class="option-list"></div>
      <div class="button-row" style="margin-top:16px;justify-content:space-between">
        <button class="btn secondary" id="prevBtn" type="button" onclick="prevQ()"></button>
        <button class="btn primary" id="nextBtn" type="button" onclick="nextQ()"></button>
      </div>
    </div>
  </section>

  <section id="loading" class="panel pad section hidden">
    <h2 id="loadingTitle"></h2>
    <p id="loadingDesc"></p>
  </section>

  <section id="report" class="hidden section">
    <div class="panel pad section">
      <div class="row" style="margin-bottom:12px">
        <div class="pill" id="mbtiTag"></div>
        <button class="btn secondary ghost" id="goHomeBtn" type="button" onclick="goHome()"></button>
      </div>

      <div class="report-grid">
        <div class="card soft">
          <h2 id="reportTitle"></h2>
          <p id="overview"></p>
          <div class="grid2" style="margin-top:14px">
            <div class="card" style="background:#fff"><strong id="consistencyTitle"></strong><p id="consistency"></p></div>
            <div class="card" style="background:#fff"><strong id="valuesSummaryTitle"></strong><p id="valuesSummary"></p></div>
          </div>
          <div class="grid2" style="margin-top:14px">
            <div class="card" style="background:#fff">
              <strong id="bigFiveTitle"></strong>
              <div id="bigFive"></div>
            </div>
            <div class="card" style="background:#fff">
              <strong id="radarTitle"></strong>
              <canvas id="radar" width="320" height="320"></canvas>
            </div>
          </div>
        </div>
        <div class="card soft">
          <h2 id="careerTitle"></h2>
          <div id="careers" class="report-card-list"></div>
        </div>
      </div>

      <div class="grid3 section">
        <div class="card soft"><h2 id="avoidTitle"></h2><div id="avoid" class="report-card-list"></div></div>
        <div class="card soft"><h2 id="roadmapTitle"></h2><div id="roadmap" class="report-card-list"></div></div>
        <div class="card soft"><h2 id="learningTitle"></h2><div id="learning" class="report-card-list"></div></div>
      </div>
    </div>
  </section>
</div>

let state = loadState();
let answers = state.answers || {};
let mbtiSelf = state.mbtiSelf || "未知";
let adaptiveTake = [];
let currentSet = [];
let currentStage = "";
let index = 0;
let lang = state.lang || "zh";
let mbtiChosen = mbtiSelf !== "未知";

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  } catch (e) {
    return {};
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    mbtiSelf,
    answers,
    report: state.report || null,
    lang
  }));
}

function resetAll() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function hideAll() {
  ["surveyShell", "loading", "report"].forEach(id => document.getElementById(id).classList.add("hidden"));
}

function goHome() {
  hideAll();
  document.getElementById("mbtiShell").classList.add("hidden");
  document.querySelector(".wide-title").scrollIntoView({ behavior: "smooth", block: "start" });
}

function toggleLang() {
  lang = lang === "zh" ? "en" : "zh";
  saveState();
  applyLanguage();
  if (state.report) renderReport(state.report);
}

function getText(key) {
  return translations[lang]?.[key] || key;
}

function fillTemplate(template, vars) {
  return template.replace(/\{(\w+)\}/g, (_, k) => vars[k] ?? "");
}

function isUnknownMbti(value) {
  return !value || value === "未知" || value === "Unknown";
}

function applyLanguage() {
  document.title = UI[lang].title;
  document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
  document.getElementById("mainTitle").textContent = UI[lang].title;
  document.getElementById("heroCopy").textContent = UI[lang].hero;
  document.getElementById("assessmentTitle").textContent = UI[lang].assessment;
  document.getElementById("assessmentDesc").textContent = UI[lang].assessmentDesc;
  document.getElementById("card1Title").textContent = UI[lang].cards[0][0];
  document.getElementById("card1Desc").textContent = UI[lang].cards[0][1];
  document.getElementById("card2Title").textContent = UI[lang].cards[1][0];
  document.getElementById("card2Desc").textContent = UI[lang].cards[1][1];
  document.getElementById("card3Title").textContent = UI[lang].cards[2][0];
  document.getElementById("card3Desc").textContent = UI[lang].cards[2][1];
  document.getElementById("card4Title").textContent = UI[lang].cards[3][0];
  document.getElementById("card4Desc").textContent = UI[lang].cards[3][1];

  document.getElementById("loadingDesc").textContent = UI[lang].loadingDesc;

function initMBTI() {
  const box = document.getElementById("mbtiGrid");
  if (!box) return;
  box.innerHTML = "";
  MBTI.forEach(v => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "choice" + (mbtiSelf === v ? " active" : "");
    b.textContent = v === "未知" ? (lang === "zh" ? "不知道" : "Unknown") : v;
    b.onclick = () => {
      mbtiSelf = v;
      mbtiChosen = v !== "未知";
      saveState();
      initMBTI();
    };
    box.appendChild(b);
  });
}

function renderQuestion() {
  const q = currentSet[index];
  document.getElementById("stageName").textContent = UI[lang].sectionBadges[currentStage] || currentStage;
  document.getElementById("surveyTitle").textContent = UI[lang].surveyTitle(currentStage);
  document.getElementById("progressText").textContent = `${index + 1} / ${currentSet.length}`;
  document.getElementById("progressBar").style.width = `${Math.round((index / currentSet.length) * 100)}%`;
  document.getElementById("questionText").textContent = q[2];
  const opt = document.getElementById("options");
  opt.innerHTML = "";
  for (let i = 1; i <= 5; i++) {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "choice" + (answers[q[0]] === i ? " active" : "");
    b.textContent = lang === "zh" ? OPTS_CN[i - 1] : OPTS_EN[i - 1];
    b.onclick = () => {
      answers[q[0]] = i;
      saveState();
      renderQuestion();
    };
    opt.appendChild(b);
  }
  document.getElementById("nextBtn").textContent = index === currentSet.length - 1 ? (currentStage === "skills" ? UI[lang].finish : UI[lang].nextStage) : UI[lang].next;
  document.getElementById("nextBtn").disabled = answers[q[0]] == null;
  document.getElementById("prevBtn").textContent = UI[lang].back;
  document.getElementById("prevBtn").disabled = index === 0;
}

function weightedScores(qs) {
  const by = {};
  qs.forEach(q => {
    const v = answers[q[0]];
    if (v == null) return;
    const real = q[5] ? 6 - v : v;
    (by[q[3]] ||= []).push(real);
  });
  return dim => {
    const arr = by[dim] || [];
    if (!arr.length) return 0;
    return Math.round(((arr.reduce((a, b) => a + b, 0) / arr.length) - 1) / 4 * 100);
  };
}

function scoreBasic() {
  const avg = weightedScores(questions.filter(q => q[1] === "basic"));
  return {
    mbti: { E: avg("E"), I: avg("I"), S: avg("S"), N: avg("N"), T: avg("T"), F: avg("F"), J: avg("J"), P: avg("P") },
    bigFive: { Openness: avg("Openness"), Conscientiousness: avg("Conscientiousness"), Extraversion: avg("Extraversion"), Agreeableness: avg("Agreeableness"), Neuroticism: avg("Neuroticism") }
  };
}

function pickAdaptive(scores) {
  const out = new Map();
  const add = dim => questions.filter(q => q[1] === "adaptive" && q[3] === dim).forEach(q => out.set(q[0], q));
  if (scores.bigFive.Openness > 70) ["Investigative", "Artistic", "DeepWork"].forEach(add);
  if (scores.bigFive.Extraversion > 70) ["Enterprising", "Social", "Leadership"].forEach(add);
  if (scores.bigFive.Conscientiousness > 70) ["Execution", "Conventional"].forEach(add);
  if (scores.bigFive.Neuroticism > 65) add("RiskTolerance");
  if (scores.bigFive.Extraversion > 65) ["Enterprising", "Leadership"].forEach(add);
  if (scores.bigFive.Openness > 65) ["Investigative", "DeepWork"].forEach(add);
  ["Investigative", "Artistic", "Social", "Enterprising", "Realistic", "Conventional", "Leadership", "Collaboration", "DeepWork", "Creativity", "Execution", "RiskTolerance"].forEach(dim => {
    if (out.size < 24) questions.filter(q => q[1] === "adaptive" && q[3] === dim).forEach(q => out.set(q[0], q));
  });
  return [...out.values()].slice(0, 24);
}

function startSurvey() {
  document.getElementById("mbtiShell").classList.remove("hidden");
  document.getElementById("surveyShell").classList.add("hidden");
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("report").classList.add("hidden");
  document.getElementById("mbtiShell").scrollIntoView({ behavior: "smooth", block: "start" });
}

function confirmMBTI() {
  mbtiChosen = true;
  state = loadState();
  answers = state.answers || {};
  adaptiveTake = [];
  currentSet = questions.filter(q => q[1] === "basic");
  currentStage = "basic";
  index = 0;
  document.getElementById("mbtiShell").classList.add("hidden");
  document.getElementById("surveyShell").classList.remove("hidden");
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("report").classList.add("hidden");
  document.getElementById("surveyShell").scrollIntoView({ behavior: "smooth", block: "start" });
  renderQuestion();
}

function skipMBTI() {
  mbtiSelf = "未知";
  mbtiChosen = false;
  saveState();
  confirmMBTI();
}

function prevQ() {
  if (index > 0) {
    index--;
    renderQuestion();
  }
}

function nextQ() {
  const q = currentSet[index];
  if (answers[q[0]] == null) return;
  if (index < currentSet.length - 1) {
    index++;
    renderQuestion();
    return;
  }
  if (currentStage === "basic") {
    adaptiveTake = pickAdaptive(scoreBasic());
    currentSet = adaptiveTake.length ? adaptiveTake : questions.filter(q => q[1] === "adaptive").slice(0, 24);
    currentStage = "adaptive";
    index = 0;
    renderQuestion();
    return;
  }
  if (currentStage === "adaptive") {
    currentSet = questions.filter(q => q[1] === "values");
    currentStage = "values";
    index = 0;
    renderQuestion();
    return;
  }
  if (currentStage === "values") {
    currentSet = questions.filter(q => q[1] === "skills");
    currentStage = "skills";
    index = 0;
    renderQuestion();
    return;
  }
  if (currentStage === "skills") {
    finish();
  }
}

function avgScore(qs, dim) {
  const arr = qs.filter(q => q[3] === dim && answers[q[0]] != null).map(q => q[5] ? 6 - answers[q[0]] : answers[q[0]]);
  if (!arr.length) return 0;
  return Math.round(((arr.reduce((a, b) => a + b, 0) / arr.length) - 1) / 4 * 100);
}

function inferMBTI(scores) {
  return (scores.E >= scores.I ? "E" : "I") + (scores.S >= scores.N ? "S" : "N") + (scores.T >= scores.F ? "T" : "F") + (scores.J >= scores.P ? "J" : "P");
}

function topKey(obj) {
  return Object.entries(obj).sort((a, b) => b[1] - a[1])[0][0];
}

function localizedReportText(r) {
  const scores = r.scores;
  const mbtiPred = r.mbtiPredicted;
  const self = r.mbtiSelf;
  const overview = fillTemplate(UI[lang].overview, {
    mbti: mbtiPred,
    riasec: getText(topKey(scores.riasec)),
    workStyle: getText(topKey(scores.workStyle))
  });
  const consistency = !isUnknownMbti(self)
    ? fillTemplate(self === mbtiPred ? UI[lang].selfReportSame : UI[lang].selfReportDiff, { self, mbti: mbtiPred })
    : fillTemplate(UI[lang].selfReportUnknown, { mbti: mbtiPred });
  const valuesSummary = fillTemplate(UI[lang].valueStrong, { value: getText(topKey(scores.values)) });
  return { overview, consistency, valuesSummary };
}

function drawRadar(canvas, values, labels) {
  const ctx = canvas.getContext("2d");
  const w = canvas.width, h = canvas.height, cx = w / 2, cy = h / 2, base = Math.min(w, h) * 0.34;
  ctx.clearRect(0, 0, w, h);
  ctx.strokeStyle = "rgba(93,132,200,.25)";
  for (let layer = 1; layer <= 3; layer++) {
    ctx.beginPath();
    for (let i = 0; i < labels.length; i++) {
      const a = -Math.PI / 2 + i * Math.PI * 2 / labels.length, r = base * layer / 3, x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
  }
  ctx.beginPath();
  values.forEach((v, i) => {
    const a = -Math.PI / 2 + i * Math.PI * 2 / values.length, r = base * (v / 100), x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fillStyle = "rgba(93,132,200,.18)";
  ctx.strokeStyle = "#5d84c8";
  ctx.lineWidth = 2;
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = "#334155";
  ctx.font = "12px system-ui";
  labels.forEach((label, i) => {
    const a = -Math.PI / 2 + i * Math.PI * 2 / labels.length;
    const x = cx + Math.cos(a) * (base + 18);
    const y = cy + Math.sin(a) * (base + 18);
    ctx.fillText(label, x - 12, y + 4);
  });
}

function normalizeScore(value) {
  if (value == null || Number.isNaN(value)) return 0.5;
  if (value > 1) return value / 100;
  return value;
}

function vectorSimilarity(userScores, careerWeights) {
  let totalWeight = 0;
  let diff = 0;
  Object.keys(careerWeights || {}).forEach(key => {
    const careerValue = normalizeScore(careerWeights[key]);
    const userValue = normalizeScore(userScores?.[key] ?? 0.5);
    const weight = Math.max(careerValue, 0.01);
    totalWeight += weight;
    diff += Math.abs(userValue - careerValue) * weight;
  });
  if (totalWeight === 0) return 0.5;
  return Math.max(0, 1 - diff / totalWeight);
}

function topKey(obj) {
  return Object.entries(obj || {}).sort((a, b) => b[1] - a[1])[0]?.[0] || "";
}

function buildProfile(scores, userMbti) {
  return {
    userMbti: userMbti || "unknown",
    inferredMbti: inferMBTI(scores.mbti),
    mbti: inferMBTI(scores.mbti),
    bigFive: scores.bigFive,
    riasec: scores.riasec,
    values: scores.values,
    workStyle: scores.workStyle,
    skills: {
      logic: scores.skills.Logic,
      expression: scores.skills.Expression,
      execution: scores.skills.Execution,
      creativity: scores.skills.Creativity,
      learning: scores.skills.Learning,
      cooperation: scores.skills.Collaboration
    },
    preferences: scores.preferences
  };
}

  };
}

function calculateCareerMatches(profile) {
  const userMbti = profile.userMbti || "unknown";
  const inferredMbti = profile.inferredMbti || profile.mbti || "UNKNOWN";
  return careerProfiles.map(career => {
    const riasecScore = vectorSimilarity(profile.riasec, career.riasec);
    const bigFiveScore = vectorSimilarity(profile.bigFive, career.bigFive);
    const valuesScore = vectorSimilarity(profile.values, career.values);
    const workStyleScore = vectorSimilarity(profile.workStyle, career.workStyle);
    const skillsScore = vectorSimilarity(profile.skills, career.skills);
    const preferencesScore = vectorSimilarity(profile.preferences, career.preferences);
    const mbtiScore = career.mbti?.includes(inferredMbti) ? 1 : 0.45;
    const userMbtiBonus = userMbti !== "unknown" && career.mbti?.includes(userMbti) ? 0.02 : 0;
    const physicalScore = 1 - Math.abs(normalizeScore(profile.preferences?.physicalPreference ?? 0.5) - normalizeScore(career.physicalDemand ?? 0.5));
    const stabilityScore = 1 - Math.abs(normalizeScore(profile.preferences?.stabilityPreference ?? 0.5) - normalizeScore(career.stabilityLevel ?? 0.5));
    const riskScore = 1 - Math.abs(normalizeScore(profile.preferences?.riskTolerance ?? 0.5) - normalizeScore(career.riskLevel ?? 0.5));
    const finalScore = riasecScore * 0.23 + bigFiveScore * 0.16 + valuesScore * 0.15 + workStyleScore * 0.12 + skillsScore * 0.10 + preferencesScore * 0.10 + mbtiScore * 0.05 + physicalScore * 0.04 + stabilityScore * 0.03 + riskScore * 0.02 + userMbtiBonus;
    const reasons = generateCareerReasons(profile, career);
    const risks = generateCareerRisks(profile, career);
    return {
      ...career,
      score: Math.round(Math.min(finalScore, 1) * 100),
      reasonsZh: reasons.zh,
      reasonsEn: reasons.en,
      risksZh: risks.zh,
      risksEn: risks.en
    };
  }).sort((a, b) => b.score - a.score).slice(0, 10);
}

    { yearZh: "第3年：形成竞争力标签", goalZh: "沉淀个人标签，提高议价能力，尝试更高平台。", actionsZh: ["沉淀一项核心优势标签", "拓展更高平台或更高收入机会", "完善作品集、简历与面试表达", "准备备选路径和转型预案"], milestonesZh: ["有清晰职业标签", "形成稳定的收入或成长路径", "能独立判断下一步选择"], risksZh: ["过度追求上限忽略适配", "忽视身体和心理消耗"] }
  ];
  if (isTech) {
    list[0].actionsZh.push("强化编程、数据分析、算法或 GitHub 作品");
    list[1].actionsZh.push("用项目、论文或实验结果证明能力");
    list[2].actionsZh.push("为技术深耕或产品/管理转向准备路线");
  }
  if (isBusiness) {
    list[0].actionsZh.push("练习商业分析、沟通表达和项目推进");
    list[1].actionsZh.push("在真实业务里积累可量化成果");
    list[2].actionsZh.push("建立行业视角与管理/商业标签");
  }
  if (isCreative) {
    list[0].actionsZh.push("持续输出作品集和内容");
    list[1].actionsZh.push("提升审美、发布频率和复盘机制");
    list[2].actionsZh.push("形成个人风格与稳定输出渠道");
  }
  if (isSkilled) {
    list[0].actionsZh.push("考取技能证书并接受带教");
    list[1].actionsZh.push("累积实操工时和标准化经验");
    list[2].actionsZh.push("维护体能并重视安全规范");
  }
  if (isSports) {

function renderBigFive(profile) {
  return Object.entries(profile.bigFive || {}).map(([k, v]) => `
    <div class="metric">
      <div class="row"><span>${t(k, lang)}</span><span>${Math.round(normalizeScore(v) * 100)}%</span></div>
      <div class="bar"><div style="width:${Math.round(normalizeScore(v) * 100)}%"></div></div>
    </div>
  `).join("");
}

function renderCareerCards(careerMatches) {
  return careerMatches.map(item => {
    const physical = item.physicalDemand >= 0.7 ? (lang === "zh" ? "高" : "High") : item.physicalDemand >= 0.4 ? (lang === "zh" ? "中" : "Medium") : (lang === "zh" ? "低" : "Low");
    const stability = item.stabilityLevel >= 0.7 ? (lang === "zh" ? "高" : "High") : item.stabilityLevel >= 0.4 ? (lang === "zh" ? "中" : "Medium") : (lang === "zh" ? "低" : "Low");
    const risk = item.riskLevel >= 0.7 ? (lang === "zh" ? "高" : "High") : item.riskLevel >= 0.4 ? (lang === "zh" ? "中" : "Medium") : (lang === "zh" ? "低" : "Low");
    const reasons = lang === "zh" ? item.reasonsZh : item.reasonsEn;
    const risks = lang === "zh" ? item.risksZh : item.risksEn;
    return `
      <div class="card" style="background:#fff;margin-bottom:10px;width:100%">
        <strong>${lang === "zh" ? item.titleZh : item.titleEn}</strong>
        <p>${lang === "zh" ? item.categoryZh : item.categoryEn}</p>
        <p>${lang === "zh" ? "匹配度" : "Match"}：${item.score}%</p>
        <p>${lang === "zh" ? "体力要求" : "Physical"}：${physical} · ${lang === "zh" ? "稳定性" : "Stability"}：${stability} · ${lang === "zh" ? "风险水平" : "Risk"}：${risk}</p>
        <p><strong>${lang === "zh" ? "推荐理由" : "Reasons"}：</strong>${(reasons || []).join(" ")}</p>
        <p><strong>${lang === "zh" ? "注意事项" : "Notes"}：</strong>${(risks || []).join(" ")}</p>
      </div>
    `;
  }).join("");
}

  const careerMatches = calculateCareerMatches(profile);
  const unsuitableDirections = generateUnsuitableDirections(profile, careerMatches);
  const roadmap = generateThreeYearRoadmap(profile, careerMatches);
  const learningAdvice = generateLearningAdvice(profile, careerMatches);
  console.log("用户自填MBTI", profile.userMbti);
  console.log("用户画像", profile);
  console.log("职业匹配结果", careerMatches);
  return {
    createdAt: new Date().toISOString(),
    mbtiSelf: profile.userMbti,

    unsuitableDirections,
    roadmap,

        ? (lang === "zh" ? "你的自填 MBTI 与问卷推断结果基本一致，说明你的自我认知与问卷画像较为接近。" : "Your self-reported MBTI and inferred MBTI are broadly aligned.")
        : (lang === "zh" ? "你的自填 MBTI 与问卷推断结果存在差异，建议以综合画像为主，不要单独依赖 MBTI。" : "Your self-reported MBTI differs from the inferred result, so rely on the full profile rather than MBTI alone."),
    valuesSummary: lang === "zh" ? `你最重视的职业价值观是：${t(topKey(scores.values), lang)}。` : `Your strongest career value is ${t(topKey(scores.values), lang)}.`,
    radarLabels: lang === "zh" ? [t("logic", lang), t("expression", lang), t("execution", lang), t("creativity", lang), t("learning", lang), t("cooperation", lang)] : ["Logic","Expression","Execution","Creativity","Learning","Cooperation"]
  };
}

function finish() {
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("loading").scrollIntoView({ behavior: "smooth", block: "start" });
  setTimeout(() => {
    const basicQs = questions.filter(q => q[1] === "basic");
    const adaptiveQs = adaptiveTake.length ? adaptiveTake : questions.filter(q => q[1] === "adaptive").slice(0, 24);
    const valuesQs = questions.filter(q => q[1] === "values");
    const skillsQs = questions.filter(q => q[1] === "skills");
    const scores = {
      mbti: {
        E: avgScore(basicQs, "E"), I: avgScore(basicQs, "I"),
        S: avgScore(basicQs, "S"), N: avgScore(basicQs, "N"),
        T: avgScore(basicQs, "T"), F: avgScore(basicQs, "F"),
        J: avgScore(basicQs, "J"), P: avgScore(basicQs, "P")
      },
      bigFive: {
        Openness: avgScore(basicQs, "Openness"),
        Conscientiousness: avgScore(basicQs, "Conscientiousness"),
        Extraversion: avgScore(basicQs, "Extraversion"),
        Agreeableness: avgScore(basicQs, "Agreeableness"),
        Neuroticism: avgScore(basicQs, "Neuroticism")
      },
      riasec: {
        Realistic: avgScore(adaptiveQs, "Realistic"),
        Investigative: avgScore(adaptiveQs, "Investigative"),
        Artistic: avgScore(adaptiveQs, "Artistic"),
        Social: avgScore(adaptiveQs, "Social"),
        Enterprising: avgScore(adaptiveQs, "Enterprising"),
        Conventional: avgScore(adaptiveQs, "Conventional")
      },
      values: {
        Wealth: avgScore(valuesQs, "Wealth"),
        Stability: avgScore(valuesQs, "Stability"),
        Freedom: avgScore(valuesQs, "Freedom"),
        Achievement: avgScore(valuesQs, "Achievement"),
        Influence: avgScore(valuesQs, "Influence"),
        SocialImpact: avgScore(valuesQs, "SocialImpact"),
        WorkLifeBalance: avgScore(valuesQs, "WorkLifeBalance")
      },
      workStyle: {
        Leadership: avgScore(adaptiveQs, "Leadership"),
        Collaboration: avgScore(adaptiveQs, "Collaboration"),
        DeepWork: avgScore(adaptiveQs, "DeepWork"),
        Creativity: avgScore(adaptiveQs, "Creativity"),
        Execution: avgScore(adaptiveQs, "Execution"),
        RiskTolerance: avgScore(adaptiveQs, "RiskTolerance")
      },
      skills: {
        Logic: avgScore(skillsQs, "Logic"),
        Expression: avgScore(skillsQs, "Expression"),
        Execution: avgScore(skillsQs, "Execution"),
        Creativity: avgScore(skillsQs, "Creativity"),
        Learning: avgScore(skillsQs, "Learning"),
        Organization: avgScore(skillsQs, "Organization"),
        Empathy: avgScore(skillsQs, "Empathy"),
        StressTolerance: avgScore(skillsQs, "StressTolerance"),
        Leadership: avgScore(skillsQs, "Leadership"),
        Collaboration: avgScore(skillsQs, "Collaboration")
      },
      preferences: {
        physicalPreference: Math.max(avgScore(adaptiveQs, "Realistic"), avgScore(skillsQs, "Execution")) / 100,
        stabilityPreference: avgScore(valuesQs, "Stability") / 100,
        riskTolerance: avgScore(adaptiveQs, "RiskTolerance") / 100,
        competitionPreference: avgScore(adaptiveQs, "Enterprising") / 100,
        gameInterest: Math.max(avgScore(adaptiveQs, "Enterprising"), avgScore(adaptiveQs, "Creativity")) / 100,
        outdoorPreference: avgScore(adaptiveQs, "Realistic") / 100,
        handsOnPreference: avgScore(adaptiveQs, "Realistic") / 100
      }
    };
    const mbtiPred = inferMBTI(scores.mbti);
    const profile = buildProfile(scores, mbtiSelf);
    const report = buildReport(profile, scores, mbtiPred);
    state.report = report;
    state.answers = answers;
    state.mbtiSelf = mbtiSelf;
    saveState();
    renderReport(report);
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("report").classList.remove("hidden");
    document.getElementById("report").scrollIntoView({ behavior: "smooth", block: "start" });
  }, 280);
}

function renderReport(r) {
  document.getElementById("mbtiTag").textContent = UI[lang].mbtiTag(r.mbtiPredicted, r.mbtiSelf);
  document.getElementById("overview").textContent = r.overview;
  document.getElementById("consistency").textContent = r.consistency;
  document.getElementById("valuesSummary").textContent = r.valuesSummary;
  document.getElementById("bigFive").innerHTML = renderBigFive(r.profile);
  document.getElementById("careers").innerHTML = renderCareerCards(r.careerMatches);
  document.getElementById("avoid").innerHTML = renderDirections(r.unsuitableDirections);
  document.getElementById("roadmap").innerHTML = renderRoadmap(r.roadmap);
  document.getElementById("learning").innerHTML = renderLearning(r.learningAdvice);
  drawRadar(
    document.getElementById("radar"),
    [r.scores.skills.Logic, r.scores.skills.Expression, r.scores.skills.Execution, r.scores.skills.Creativity, r.scores.skills.Learning, r.scores.skills.Collaboration],
    r.radarLabels
  );
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("langBtn").textContent = "中文 / English";
  initMBTI();
  applyLanguage();
  if (state.report) {
    renderReport(state.report);
    document.getElementById("report").classList.remove("hidden");
  }
});
</script>
</body>
</html>
