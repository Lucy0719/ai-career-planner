<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>职业规划与人生道路建议</title>
  <style>
    :root{--bg:#f5f7fb;--panel:#fff;--panel2:#f2f5fa;--line:#d7deea;--text:#18202d;--muted:#5f6b7b;--accent:#5d84c8;--accent2:#7ea8d9;--shadow:0 12px 32px rgba(23,38,67,.08)}
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    button,input{font:inherit}
    .wrap{max-width:1240px;margin:0 auto;padding:24px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
    .pad{padding:24px}
    h1{margin:0;font-size:40px;line-height:1.15}
    h2{margin:0 0 12px;font-size:22px}
    p{margin:0;color:var(--muted);line-height:1.7}
    .topbar{display:flex;justify-content:flex-end;margin-bottom:10px}
    .lang-btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;color:var(--text);cursor:pointer;font-weight:700}
    .wide-title{width:100%;padding:28px;background:linear-gradient(180deg,#fff 0%,#f8fafc 100%)}
    .nav{display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-start}
    .btn{border:1px solid transparent;border-radius:12px;padding:13px 18px;cursor:pointer;font-weight:700}
    .btn.primary{background:linear-gradient(180deg,var(--accent) 0%, #4f75b3 100%);color:#fff}
    .btn.secondary{background:#fff;color:var(--muted);border-color:var(--line)}
    .btn.secondary.ghost{background:#f8fafc}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
    .card{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:16px}
    .card.soft{background:#f7f9fd}
    .pill{display:inline-flex;align-items:center;padding:7px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:12px}
    .hidden{display:none !important}
    .section{margin-top:18px}
    .section-title{margin-bottom:14px}
    .section-title h2{margin-bottom:6px}
    .choice{width:100%;text-align:left;margin-top:8px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);padding:12px 14px;cursor:pointer}
    .choice.active{border-color:var(--accent);background:#edf3ff}
    .choice:hover{background:#f8fbff}
    .bar{height:10px;background:#e9eef6;border-radius:999px;overflow:hidden}
    .bar>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .muted{color:var(--muted)}
    .qtext{font-size:20px;line-height:1.6;min-height:88px;color:var(--text)}
    .option-list{display:grid;gap:10px}
    .report-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
    .metric{margin:10px 0}
    .metric .row{font-size:13px;margin-bottom:6px}
    canvas{max-width:100%;display:block}
    .button-row{display:flex;gap:12px;align-items:center;justify-content:flex-start;flex-wrap:wrap}
    .lead{font-size:16px}
    .section-soft{background:linear-gradient(180deg,#fff 0%, #fbfcfe 100%)}
    .question-shell{max-width:920px;margin:0 auto}
    .title-row{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}
    .title-copy{max-width:920px}
    @media (max-width:1020px){.grid4,.grid3,.grid2,.report-grid{grid-template-columns:1fr}h1{font-size:32px}.title-row{flex-direction:column}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><button class="lang-btn" id="langBtn" onclick="toggleLang()">中文 / English</button></div>
  <section class="panel wide-title">
    <div class="title-row">
      <div class="title-copy">
        <h1 id="mainTitle"></h1>
        <p class="lead" id="heroCopy"></p>
      </div>
    </div>
  </section>

  <section class="panel pad section section-soft">
    <div class="section-title">
      <h2 id="assessmentTitle"></h2>
      <p id="assessmentDesc"></p>
    </div>
    <div class="grid4">
      <div class="card soft"><strong id="card1Title"></strong><p id="card1Desc"></p></div>
      <div class="card soft"><strong id="card2Title"></strong><p id="card2Desc"></p></div>
      <div class="card soft"><strong id="card3Title"></strong><p id="card3Desc"></p></div>
      <div class="card soft"><strong id="card4Title"></strong><p id="card4Desc"></p></div>
    </div>
  </section>

  <section class="section"><div class="button-row"><button class="btn primary" id="startBtn" onclick="startSurvey()"></button><button class="btn secondary ghost" id="resetBtn" onclick="resetAll()"></button></div></section>
  <section id="surveyShell" class="panel pad section hidden">
    <div class="question-shell">
      <div class="row"><div><div class="stage" id="stageName"></div><h2 id="surveyTitle"></h2></div><div class="muted" id="progressText"></div></div>
      <div class="bar" style="margin:10px 0 18px"><div id="progressBar" style="width:0%"></div></div>
      <div class="qtext" id="questionText"></div>
      <div id="options" class="option-list"></div>
      <div class="button-row" style="margin-top:16px;justify-content:space-between"><button class="btn secondary" onclick="prevQ()">返回</button><button class="btn primary" id="nextBtn" onclick="nextQ()">下一题</button></div>
    </div>
  </section>
  <section id="loading" class="panel pad section hidden"><h2 id="loadingTitle"></h2><p id="loadingDesc"></p></section>
  <section id="report" class="hidden section">
    <div class="panel pad section">
      <div class="row" style="margin-bottom:12px"><div class="pill" id="mbtiTag"></div><button class="btn secondary ghost" onclick="goHome()" id="goHomeBtn"></button></div>
      <div class="report-grid">
        <div class="card soft">
          <h2 id="reportTitle"></h2>
          <p id="overview"></p>
          <div class="grid2" style="margin-top:14px">
            <div class="card" style="background:#fff"><strong id="consistencyTitle"></strong><p id="consistency"></p></div>
            <div class="card" style="background:#fff"><strong id="valuesSummaryTitle"></strong><p id="valuesSummary"></p></div>
          </div>
          <div class="grid2" style="margin-top:14px">
            <div class="card" style="background:#fff"><strong>Big Five</strong><div id="bigFive"></div></div>
            <div class="card" style="background:#fff"><strong id="radarTitle"></strong><canvas id="radar" width="320" height="320"></canvas></div>
          </div>
        </div>
        <div class="card soft"><h2 id="careerTitle"></h2><div id="careers"></div></div>
      </div>
      <div class="grid3 section">
        <div class="card soft"><h2 id="avoidTitle"></h2><div id="avoid"></div></div>
        <div class="card soft"><h2 id="roadmapTitle"></h2><div id="roadmap"></div></div>
        <div class="card soft"><h2 id="learningTitle"></h2><div id="learning"></div></div>
      </div>
    </div>
  </section>
</div>

  document.getElementById("assessmentDesc").textContent = UI[lang].assessmentDesc;
  document.getElementById("card1Title").textContent = UI[lang].cards[0][0];
  document.getElementById("card1Desc").textContent = UI[lang].cards[0][1];
  document.getElementById("card2Title").textContent = UI[lang].cards[1][0];
  document.getElementById("card2Desc").textContent = UI[lang].cards[1][1];
  document.getElementById("card3Title").textContent = UI[lang].cards[2][0];
  document.getElementById("card3Desc").textContent = UI[lang].cards[2][1];
  document.getElementById("card4Title").textContent = UI[lang].cards[3][0];
  document.getElementById("card4Desc").textContent = UI[lang].cards[3][1];
  document.getElementById("startBtn").textContent = UI[lang].start;
  document.getElementById("resetBtn").textContent = UI[lang].reset;
  document.getElementById("loadingTitle").textContent = UI[lang].loading;
  document.getElementById("loadingDesc").textContent = UI[lang].loadingDesc;
  document.getElementById("reportTitle").textContent = UI[lang].reportTitle;
  document.getElementById("consistencyTitle").textContent = UI[lang].consistency;
  document.getElementById("valuesSummaryTitle").textContent = UI[lang].valuesSummary;
  document.getElementById("radarTitle").textContent = UI[lang].radar;
  document.getElementById("careerTitle").textContent = UI[lang].careers;
  document.getElementById("avoidTitle").textContent = UI[lang].avoid;
  document.getElementById("roadmapTitle").textContent = UI[lang].roadmap;
  document.getElementById("learningTitle").textContent = UI[lang].learning;
  document.getElementById("goHomeBtn").textContent = UI[lang].goHome;
}

function initMBTI(){
  const box = document.getElementById("mbtiGrid");
  if(!box) return;
  box.innerHTML = "";
  MBTI.forEach(v => {
    const b = document.createElement("button");
    b.className = "choice" + (mbtiSelf === v ? " active" : "");
    b.textContent = v;
    b.onclick = () => { mbtiSelf = v; saveState(); initMBTI(); };
    box.appendChild(b);
  });
}

function weightedScores(qs){
  const by = {};
  qs.forEach(q => {
    const v = answers[q[0]];
    if(v == null) return;
    const real = q[5] ? 6 - v : v;
    (by[q[3]] ||= []).push(real);
  });
  return dim => {
    const arr = by[dim] || [];
    if(!arr.length) return 0;
    return Math.round(((arr.reduce((a,b)=>a+b,0) / arr.length) - 1) / 4 * 100);
  };
}

function scoreBasic(){
  const avg = weightedScores(questions.filter(q => q[1] === "basic"));
  return {
    mbti: { E: avg("E"), I: avg("I"), S: avg("S"), N: avg("N"), T: avg("T"), F: avg("F"), J: avg("J"), P: avg("P") },
    bigFive: { Openness: avg("Openness"), Conscientiousness: avg("Conscientiousness"), Extraversion: avg("Extraversion"), Agreeableness: avg("Agreeableness"), Neuroticism: avg("Neuroticism") }
  };
}

function pickAdaptive(scores){
  const out = new Map();
  const add = dim => questions.filter(q => q[1] === "adaptive" && q[3] === dim).forEach(q => out.set(q[0], q));
  add("Investigative"); add("Artistic"); add("DeepWork"); add("Creativity");
  if(scores.bigFive.Openness > 70) ["Investigative","Artistic","DeepWork"].forEach(add);
  if(scores.bigFive.Extraversion > 70) ["Enterprising","Social","Leadership"].forEach(add);
  if(scores.bigFive.Conscientiousness > 70) ["Execution","Conventional"].forEach(add);
  if(scores.bigFive.Neuroticism > 65) add("RiskTolerance");
  if(scores.bigFive.Extraversion > 65) ["Enterprising","Leadership"].forEach(add);
  if(scores.bigFive.Openness > 65) ["Investigative","DeepWork"].forEach(add);
  ["Investigative","Artistic","Social","Enterprising","Realistic","Conventional","Leadership","Collaboration","DeepWork","Creativity","Execution","RiskTolerance"].forEach(dim => {
    if(out.size < 24) questions.filter(q => q[1] === "adaptive" && q[3] === dim).forEach(q => out.set(q[0], q));
  });
  return [...out.values()].slice(0,24);
}

function startSurvey(){
  state = loadState(); answers = state.answers || {};
  adaptiveTake = pickAdaptive(scoreBasic());
  currentSet = questions.filter(q => q[1] === "basic");
  currentStage = "basic";
  index = 0;
  document.getElementById("surveyShell").classList.remove("hidden");
  document.getElementById("surveyShell").scrollIntoView({behavior:"smooth", block:"start"});
  renderQuestion();
}

function renderQuestion(){
  const q = currentSet[index];
  document.getElementById("stageName").textContent = currentStage;
  document.getElementById("surveyTitle").textContent = currentStage === "basic" ? (lang === "zh" ? "基础人格问卷" : "Personality Questionnaire") : currentStage === "values" ? (lang === "zh" ? "职业价值观" : "Career Values") : (lang === "zh" ? "能力自评" : "Skill Self-Assessment");
  document.getElementById("progressText").textContent = `${index+1} / ${currentSet.length}`;
  document.getElementById("progressBar").style.width = `${Math.round((index/currentSet.length)*100)}%`;
  document.getElementById("questionText").textContent = q[2];
  const opt = document.getElementById("options");
  opt.innerHTML = "";
  for(let i=1;i<=5;i++){
    const b = document.createElement("button");
    b.className = "choice" + (answers[q[0]] === i ? " active" : "");
    b.textContent = lang === "zh" ? OPTS_CN[i-1] : OPTS_EN[i-1];
    b.onclick = () => { answers[q[0]] = i; saveState(); renderQuestion(); };
    opt.appendChild(b);
  }
  document.getElementById("nextBtn").textContent = index === currentSet.length - 1 ? (currentStage === "skills" ? (lang === "zh" ? "完成并生成报告" : "Finish and Generate Report") : (lang === "zh" ? "下一阶段" : "Next Stage")) : (lang === "zh" ? "下一题" : "Next");
  document.getElementById("nextBtn").disabled = answers[q[0]] == null;
  const backBtn = document.querySelector("#surveyShell .btn.secondary");
  backBtn.textContent = lang === "zh" ? "返回" : "Back";
  backBtn.disabled = index === 0;
}

function prevQ(){ if(index > 0){ index--; renderQuestion(); } }
function nextQ(){
  const q = currentSet[index];
  if(answers[q[0]] == null) return;
  if(index < currentSet.length - 1){ index++; renderQuestion(); return; }
  if(currentStage === "basic"){ currentSet = questions.filter(q => q[1] === "values"); currentStage = "values"; index = 0; renderQuestion(); return; }
  if(currentStage === "values"){ currentSet = questions.filter(q => q[1] === "skills"); currentStage = "skills"; index = 0; renderQuestion(); return; }
  if(currentStage === "skills"){ finish(); return; }
}

function avgScore(qs, dim){
  const arr = qs.filter(q => q[3] === dim && answers[q[0]] != null).map(q => q[5] ? 6 - answers[q[0]] : answers[q[0]]);
  if(!arr.length) return 0;
  return Math.round(((arr.reduce((a,b)=>a+b,0)/arr.length)-1)/4*100);
}

function inferMBTI(scores){
  return (scores.E >= scores.I ? "E" : "I") + (scores.S >= scores.N ? "S" : "N") + (scores.T >= scores.F ? "T" : "F") + (scores.J >= scores.P ? "J" : "P");
}

function topKey(obj){ return Object.entries(obj).sort((a,b)=>b[1]-a[1])[0][0]; }

function finish(){
  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("loading").scrollIntoView({behavior:"smooth", block:"start"});
  setTimeout(() => {
    const basicQs = questions.filter(q => q[1] === "basic");
    const adaptiveQs = adaptiveTake;
    const valuesQs = questions.filter(q => q[1] === "values");
    const skillsQs = questions.filter(q => q[1] === "skills");
    const scores = {
      mbti: { E: avgScore(basicQs,"E"), I: avgScore(basicQs,"I"), S: avgScore(basicQs,"S"), N: avgScore(basicQs,"N"), T: avgScore(basicQs,"T"), F: avgScore(basicQs,"F"), J: avgScore(basicQs,"J"), P: avgScore(basicQs,"P") },
      bigFive: { Openness: avgScore(basicQs,"Openness"), Conscientiousness: avgScore(basicQs,"Conscientiousness"), Extraversion: avgScore(basicQs,"Extraversion"), Agreeableness: avgScore(basicQs,"Agreeableness"), Neuroticism: avgScore(basicQs,"Neuroticism") },
      riasec: { Realistic: avgScore(adaptiveQs,"Realistic"), Investigative: avgScore(adaptiveQs,"Investigative"), Artistic: avgScore(adaptiveQs,"Artistic"), Social: avgScore(adaptiveQs,"Social"), Enterprising: avgScore(adaptiveQs,"Enterprising"), Conventional: avgScore(adaptiveQs,"Conventional") },
      values: { Wealth: avgScore(valuesQs,"Wealth"), Stability: avgScore(valuesQs,"Stability"), Freedom: avgScore(valuesQs,"Freedom"), Achievement: avgScore(valuesQs,"Achievement"), Influence: avgScore(valuesQs,"Influence"), SocialImpact: avgScore(valuesQs,"SocialImpact"), WorkLifeBalance: avgScore(valuesQs,"WorkLifeBalance") },
      workStyle: { Leadership: avgScore(adaptiveQs,"Leadership"), Collaboration: avgScore(adaptiveQs,"Collaboration"), DeepWork: avgScore(adaptiveQs,"DeepWork"), Creativity: avgScore(adaptiveQs,"Creativity"), Execution: avgScore(adaptiveQs,"Execution"), RiskTolerance: avgScore(adaptiveQs,"RiskTolerance") },
      skills: { Logic: avgScore(skillsQs,"Logic"), Expression: avgScore(skillsQs,"Expression"), Execution: avgScore(skillsQs,"Execution"), Creativity: avgScore(skillsQs,"Creativity"), Learning: avgScore(skillsQs,"Learning"), Organization: avgScore(skillsQs,"Organization"), Empathy: avgScore(skillsQs,"Empathy"), StressTolerance: avgScore(skillsQs,"StressTolerance"), Leadership: avgScore(skillsQs,"Leadership"), Collaboration: avgScore(skillsQs,"Collaboration") }
    };
    const mbtiPred = inferMBTI(scores.mbti);
    const report = {
      createdAt: new Date().toISOString(),
      mbtiSelf,
      mbtiPredicted: mbtiPred,
      scores,
      overview: lang === "zh" ? `你是一个 ${mbtiPred} 倾向明显的人，整体更接近 “${getText(topKey(scores.riasec))} + ${getText(topKey(scores.workStyle))}” 的组合。` : `You show a clear ${mbtiPred} tendency, with a profile closer to "${getText(topKey(scores.riasec))} + ${getText(topKey(scores.workStyle))}".`,
      consistency: mbtiSelf && mbtiSelf !== (lang === "zh" ? "未知" : "Unknown")
        ? (lang === "zh" ? `自填 MBTI ${mbtiSelf} 与问卷推断 ${mbtiPred} ${mbtiSelf===mbtiPred ? "基本一致" : "存在差异"}。` : `Self-reported MBTI ${mbtiSelf} and inferred MBTI ${mbtiPred} are ${mbtiSelf===mbtiPred ? "generally aligned" : "not fully aligned"}.`)
        : (lang === "zh" ? `你未提供自填 MBTI，因此以问卷推断 ${mbtiPred} 为主。` : `No self-reported MBTI was provided, so ${mbtiPred} is used as the main inference.`),
      valuesSummary: lang === "zh" ? `你最重视的职业价值观是：${getText(topKey(scores.values))}。` : `Your strongest career value is ${topKey(scores.values)}.`,
      recommended: [
        ["产品经理","适合综合型画像，吃重逻辑、协作、表达和推动结果。"],
        ["数据分析师","适合高逻辑、高深度工作倾向，能把分析转成行动建议。"],
        ["研究员/研究助理","适合高开放性与研究型倾向。"],
        ["策略/商业分析","需要抽象思考、结构化判断与沟通。"],
        ["内容策划/品牌策略","适合创意与表达同时在线的人。"],
        ["咨询顾问","适合高表达、高影响力、高适应性。"],
        ["运营管理","适合执行、组织和协作能力较强的人。"],
        ["项目经理","需要统筹、推进与风险控制。"],
        ["教育培训/职业教练","适合共情、表达和帮助他人成长。"],
        ["技术产品/AI应用设计","适合技术理解、产品抽象和跨学科协作。"]
      ],
      avoid: ["极度重复、低自主、低反馈的流水线岗位","长期高冲突、强压迫式管理环境","与核心价值观明显冲突、难以体现个人意义的岗位"],
      roadmap: ["第1年：确认核心优势，补齐最薄弱的 1-2 项硬技能，完成 2-3 个可展示项目。","第2年：在目标方向上形成作品集、案例库或业务成果，争取一次跨角色成长。","第3年：向更高杠杆岗位迁移，强化影响力、方法论与个人品牌。"],
      learning: ["先学通用底层：逻辑表达、数据分析、项目协作、AI 工具使用。","再按职业方向分流：研究型强化统计与写作，商业型强化用户/市场/财务，产品型强化需求分析和方案设计。","每 6-8 周复盘一次职业匹配度，及时修正路径。"],
      risks: ["MBTI 只作为自填参考，不是唯一结论。","如果神经质偏高或风险规避强，不要过早进入极高不确定赛道。","如果价值观中稳定与自由同时很高，优先选择弹性大但边界清晰的岗位。"]
    };
    state.report = report;
    saveState();
    renderReport(report);
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("report").classList.remove("hidden");
    document.getElementById("report").scrollIntoView({behavior:"smooth", block:"start"});
  }, 650);
}

function renderReport(r){
  document.getElementById("mbtiTag").textContent = UI[lang].mbtiTag(r.mbtiPredicted, r.mbtiSelf);
  document.getElementById("overview").textContent = r.overview;
  document.getElementById("consistency").textContent = r.consistency;
  document.getElementById("valuesSummary").textContent = r.valuesSummary;
  document.getElementById("bigFive").innerHTML = Object.entries(r.scores.bigFive).map(([k,v]) => `<div class="metric"><div class="row"><span>${getText(k)}</span><span>${v}</span></div><div class="bar"><div style="width:${v}%"></div></div></div>`).join("");
  document.getElementById("careers").innerHTML = r.recommended.map(([a,b]) => `<div class="card" style="background:#fff;margin-bottom:10px"><strong>${a}</strong><p>${b}</p></div>`).join("");
  document.getElementById("avoid").innerHTML = r.avoid.map(x => `<div class="card" style="background:#fff;margin-bottom:10px">${x}</div>`).join("");
  document.getElementById("roadmap").innerHTML = r.roadmap.map(x => `<div class="card" style="background:#fff;margin-bottom:10px">${x}</div>`).join("");
  document.getElementById("learning").innerHTML = [...r.learning, ...r.risks].map(x => `<div class="card" style="background:#fff;margin-bottom:10px">${x}</div>`).join("");
  drawRadar(document.getElementById("radar"), [r.scores.skills.Logic,r.scores.skills.Expression,r.scores.skills.Execution,r.scores.skills.Creativity,r.scores.skills.Learning,r.scores.skills.Collaboration], lang === "zh" ? [getText("logic"), getText("expression"), getText("execution"), getText("creativity"), getText("learning"), getText("cooperation")] : ["Logic","Expression","Execution","Creativity","Learning","Cooperation"]);
}

function drawRadar(canvas, values, labels){
  const ctx = canvas.getContext("2d"), w = canvas.width, h = canvas.height, cx = w/2, cy = h/2, base = 110;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle = "rgba(93,132,200,.25)";
  for(let layer=1; layer<=3; layer++){
    ctx.beginPath();
    for(let i=0;i<labels.length;i++){
      const a = -Math.PI/2 + i*Math.PI*2/labels.length, r = base*layer/3, x = cx + Math.cos(a)*r, y = cy + Math.sin(a)*r;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath(); ctx.stroke();
  }
  ctx.beginPath();
  values.forEach((v,i)=>{ const a = -Math.PI/2 + i*Math.PI*2/values.length, r = base*(v/100), x = cx + Math.cos(a)*r, y = cy + Math.sin(a)*r; i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y); });
  ctx.closePath();
  ctx.fillStyle = "rgba(93,132,200,.18)";
  ctx.strokeStyle = "#5d84c8";
  ctx.lineWidth = 2;
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = "#334155";
  ctx.font = "12px system-ui";
  labels.forEach((label,i)=>{ const a = -Math.PI/2 + i*Math.PI*2/labels.length, x = cx + Math.cos(a)*(base+18), y = cy + Math.sin(a)*(base+18); ctx.fillText(label, x-12, y+4); });
}

document.addEventListener("DOMContentLoaded", () => {
  initMBTI();
  applyLanguage();
  if(state.report){ renderReport(state.report); document.getElementById("report").classList.remove("hidden"); }
});
</script>
